# Docker Compose 配置 - 反无技战法生成模块
version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mechgen-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NODE_ENV=development
    networks:
      - mechgen-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mechgen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - PYTHONPATH=/app
    networks:
      - mechgen-network

  # Redis 缓存 (预留)
  redis:
    image: redis:7-alpine
    container_name: mechgen-redis
    ports:
      - "6379:6379"
    networks:
      - mechgen-network

  # PostgreSQL 数据库 (预留)
  postgres:
    image: postgres:15-alpine
    container_name: mechgen-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mechgen
      POSTGRES_USER: mechgen
      POSTGRES_PASSWORD: mechgen123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mechgen-network

networks:
  mechgen-network:
    driver: bridge

volumes:
  postgres-data:
